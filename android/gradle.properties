# Gradle JVM args — AGP's CMake invocation can hold a fair bit of resident
# memory while linking the 67 MB libmain.so.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8

# Build features
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=false

# Android: AndroidX, R8 full mode (defaults but pinning for clarity)
android.useAndroidX=true
android.nonTransitiveRClass=true

# Suppress AGP's warning about new ABI defaults — we only build arm64-v8a.
android.useFullClasspathForDexingTransform=true
