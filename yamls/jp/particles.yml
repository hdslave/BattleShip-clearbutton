# SSB64 particle data ROM segments — JP (NALJ) build
# ROM addresses from splat config (smashbrothers.jp.yaml)
# These are outside the LBReloc file table and must be extracted separately.
#
# Each particle bank has two parts:
#   - scb (script bank): particle bytecode scripts
#   - txb (texture bank): particle texture data

:config:
  segments:
    - [0x00, 0x000000]

# ============================================================================
#  Global particle banks (from linker script segments)
# ============================================================================

particles_unk0_scb:
  type: BLOB
  offset: 0x95CF10
  size: 0x3E0
  symbol: particles_unk0_scb
  # Particle bank 0 script data

particles_unk0_txb:
  type: BLOB
  offset: 0x95D2F0
  size: 0x440
  symbol: particles_unk0_txb
  # Particle bank 0 texture data

particles_unk1_scb:
  type: BLOB
  offset: 0x95D730
  size: 0x200
  symbol: particles_unk1_scb
  # Particle bank 1 script data

particles_unk1_txb:
  type: BLOB
  offset: 0x95D930
  size: 0x2060
  symbol: particles_unk1_txb
  # Particle bank 1 texture data

particles_unk2_scb:
  type: BLOB
  offset: 0x95F990
  size: 0x150
  symbol: particles_unk2_scb
  # Particle bank 2 script data

particles_unk2_txb:
  type: BLOB
  offset: 0x95FAE0
  size: 0x2450
  symbol: particles_unk2_txb
  # Particle bank 2 texture data

# ============================================================================
#  Per-module particle banks (from linker Lo/Hi symbols in module headers)
# ============================================================================

